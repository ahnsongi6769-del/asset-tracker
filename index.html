<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>자산 관리</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <div id="view-container"></div>

    <nav id="tab-nav">
      <button class="tab-btn" data-view="dashboard">
        <span class="tab-icon">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 8.5L10 3l7 5.5V17a1 1 0 01-1 1H4a1 1 0 01-1-1V8.5z"/>
            <path d="M7.5 18v-6h5v6"/>
          </svg>
        </span>
        <span class="tab-label">홈</span>
      </button>
      <button class="tab-btn" data-view="matrix">
        <span class="tab-icon">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="6" height="6" rx="1.5"/>
            <rect x="11" y="3" width="6" height="6" rx="1.5"/>
            <rect x="3" y="11" width="6" height="6" rx="1.5"/>
            <rect x="11" y="11" width="6" height="6" rx="1.5"/>
          </svg>
        </span>
        <span class="tab-label">내역</span>
      </button>
      <button class="tab-btn" data-view="entry">
        <span class="tab-icon">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
            <path d="M10 4v12M4 10h12"/>
          </svg>
        </span>
        <span class="tab-label">입력</span>
      </button>
      <button class="tab-btn" data-view="settings">
        <span class="tab-icon">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="10" cy="10" r="2.5"/>
            <path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.22 4.22l1.42 1.42M14.36 14.36l1.42 1.42M4.22 15.78l1.42-1.42M14.36 5.64l1.42-1.42"/>
          </svg>
        </span>
        <span class="tab-label">설정</span>
      </button>
    </nav>
  </div>

  <!-- 전역 확인 다이얼로그 -->
  <div id="modal-confirm" class="modal hidden" role="dialog">
    <div class="modal-backdrop" id="confirm-backdrop"></div>
    <div class="modal-dialog">
      <p id="confirm-message" class="confirm-message"></p>
      <div class="dialog-actions">
        <button id="confirm-cancel" class="btn-secondary">취소</button>
        <button id="confirm-ok" class="btn-danger">확인</button>
      </div>
    </div>
  </div>

  <!-- 항목 편집 모달 -->
  <div id="modal-item-edit" class="modal hidden" role="dialog">
    <div class="modal-backdrop" id="item-edit-backdrop"></div>
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <h3 class="modal-title" id="item-edit-title">항목 추가</h3>
      <div class="modal-body">
        <div class="form-group">
          <label class="field-label" for="item-edit-name">항목명</label>
          <input type="text" id="item-edit-name" class="form-input" placeholder="예: 송이 ISA" autocorrect="off">
        </div>
        <div class="form-group">
          <label class="field-label" for="item-edit-category">카테고리</label>
          <select id="item-edit-category" class="form-select">
            <option value="비현금성">비현금성 자산</option>
            <option value="현금성">현금성 자산</option>
            <option value="부채">부채</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button id="item-edit-cancel" class="btn-secondary btn-full">취소</button>
        <button id="item-edit-save" class="btn-primary btn-full">저장</button>
      </div>
    </div>
  </div>

  <!-- Scripts (의존 순서대로) -->
  <script src="https://cdn.jsdelivr.net/npm/idb-keyval@6/dist/umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="js/utils.js"></script>
  <script src="js/format.js"></script>
  <script src="js/db.js"></script>
  <script src="js/state.js"></script>
  <script src="js/compute.js"></script>
  <script src="js/charts/netWorthLine.js"></script>
  <script src="js/charts/monthlyDelta.js"></script>
  <script src="js/charts/composition.js"></script>
  <script src="js/views/settings.js"></script>
  <script src="js/views/entry.js"></script>
  <script src="js/views/matrix.js"></script>
  <script src="js/views/dashboard.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
